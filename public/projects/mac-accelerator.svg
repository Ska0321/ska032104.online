<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#070C14"/>

  <!-- Grid lines subtle -->
  <g stroke="#0A1628" stroke-width="1" opacity="0.6">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="500" y1="0" x2="500" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="700" y1="0" x2="700" y2="500"/>
  </g>

  <!-- Chip body -->
  <rect x="240" y="130" width="320" height="240" rx="4" fill="#0C1220" stroke="#1A2E4A" stroke-width="2"/>

  <!-- Inner die -->
  <rect x="268" y="158" width="264" height="184" rx="2" fill="#0A1018" stroke="#243050" stroke-width="1"/>

  <!-- Functional blocks -->
  <rect x="280" y="170" width="80" height="60" rx="1" fill="#0D1A2E" stroke="#00B386" stroke-width="1.5" opacity="0.9"/>
  <text x="320" y="198" font-family="monospace" font-size="9" fill="#00B386" text-anchor="middle" opacity="0.8">BOOTH</text>
  <text x="320" y="210" font-family="monospace" font-size="8" fill="#00B386" text-anchor="middle" opacity="0.6">ENCODER</text>
  <text x="320" y="222" font-family="monospace" font-size="7" fill="#00B386" text-anchor="middle" opacity="0.5">×4 radix</text>

  <rect x="370" y="170" width="80" height="60" rx="1" fill="#0D1A2E" stroke="#00B386" stroke-width="1.5" opacity="0.9"/>
  <text x="410" y="198" font-family="monospace" font-size="9" fill="#00B386" text-anchor="middle" opacity="0.8">6:2</text>
  <text x="410" y="210" font-family="monospace" font-size="8" fill="#00B386" text-anchor="middle" opacity="0.6">COMPRESS</text>

  <rect x="460" y="170" width="60" height="60" rx="1" fill="#0D1A2E" stroke="#1A4A3A" stroke-width="1" opacity="0.7"/>
  <text x="490" y="204" font-family="monospace" font-size="8" fill="#2D6B56" text-anchor="middle" opacity="0.8">ADDER</text>

  <!-- Accumulator block -->
  <rect x="280" y="245" width="240" height="45" rx="1" fill="#0D1A2E" stroke="#1A4A3A" stroke-width="1.5" opacity="0.8"/>
  <text x="400" y="265" font-family="monospace" font-size="9" fill="#00B386" text-anchor="middle" opacity="0.7">ACCUMULATOR  ·  16-bit</text>
  <text x="400" y="280" font-family="monospace" font-size="7" fill="#2D6B56" text-anchor="middle" opacity="0.6">DRC / LVS Verified</text>

  <!-- Register block -->
  <rect x="280" y="305" width="110" height="28" rx="1" fill="#070E1A" stroke="#1A2E4A" stroke-width="1"/>
  <text x="335" y="322" font-family="monospace" font-size="8" fill="#2D6B56" text-anchor="middle">REG A</text>

  <rect x="400" y="305" width="120" height="28" rx="1" fill="#070E1A" stroke="#1A2E4A" stroke-width="1"/>
  <text x="460" y="322" font-family="monospace" font-size="8" fill="#2D6B56" text-anchor="middle">REG B</text>

  <!-- Pin rows — left -->
  <g stroke="#00B386" stroke-width="2" opacity="0.7">
    <line x1="220" y1="155" x2="240" y2="155"/><circle cx="216" cy="155" r="3" fill="#00B386" opacity="0.6"/>
    <line x1="220" y1="175" x2="240" y2="175"/><circle cx="216" cy="175" r="3" fill="#00B386" opacity="0.6"/>
    <line x1="220" y1="195" x2="240" y2="195"/><circle cx="216" cy="195" r="3" fill="#00B386" opacity="0.6"/>
    <line x1="220" y1="215" x2="240" y2="215"/><circle cx="216" cy="215" r="3" fill="#00B386" opacity="0.6"/>
    <line x1="220" y1="235" x2="240" y2="235"/><circle cx="216" cy="235" r="3" fill="#00B386" opacity="0.6"/>
    <line x1="220" y1="255" x2="240" y2="255"/><circle cx="216" cy="255" r="3" fill="#1A4A3A" opacity="0.5"/>
    <line x1="220" y1="275" x2="240" y2="275"/><circle cx="216" cy="275" r="3" fill="#1A4A3A" opacity="0.5"/>
    <line x1="220" y1="295" x2="240" y2="295"/><circle cx="216" cy="295" r="3" fill="#1A4A3A" opacity="0.5"/>
    <line x1="220" y1="315" x2="240" y2="315"/><circle cx="216" cy="315" r="3" fill="#1A4A3A" opacity="0.5"/>
    <line x1="220" y1="335" x2="240" y2="335"/><circle cx="216" cy="335" r="3" fill="#1A4A3A" opacity="0.5"/>
  </g>

  <!-- Pin rows — right -->
  <g stroke="#00B386" stroke-width="2" opacity="0.7">
    <line x1="560" y1="155" x2="580" y2="155"/><circle cx="584" cy="155" r="3" fill="#00B386" opacity="0.6"/>
    <line x1="560" y1="175" x2="580" y2="175"/><circle cx="584" cy="175" r="3" fill="#00B386" opacity="0.6"/>
    <line x1="560" y1="195" x2="580" y2="195"/><circle cx="584" cy="195" r="3" fill="#00B386" opacity="0.6"/>
    <line x1="560" y1="215" x2="580" y2="215"/><circle cx="584" cy="215" r="3" fill="#00B386" opacity="0.6"/>
    <line x1="560" y1="235" x2="580" y2="235"/><circle cx="584" cy="235" r="3" fill="#1A4A3A" opacity="0.5"/>
    <line x1="560" y1="255" x2="580" y2="255"/><circle cx="584" cy="255" r="3" fill="#1A4A3A" opacity="0.5"/>
    <line x1="560" y1="275" x2="580" y2="275"/><circle cx="584" cy="275" r="3" fill="#1A4A3A" opacity="0.5"/>
    <line x1="560" y1="295" x2="580" y2="295"/><circle cx="584" cy="295" r="3" fill="#1A4A3A" opacity="0.5"/>
    <line x1="560" y1="315" x2="580" y2="315"/><circle cx="584" cy="315" r="3" fill="#1A4A3A" opacity="0.5"/>
    <line x1="560" y1="335" x2="580" y2="335"/><circle cx="584" cy="335" r="3" fill="#1A4A3A" opacity="0.5"/>
  </g>

  <!-- Pin rows — top -->
  <g stroke="#1A4A3A" stroke-width="2" opacity="0.5">
    <line x1="290" y1="110" x2="290" y2="130"/><circle cx="290" cy="107" r="3" fill="#1A4A3A"/>
    <line x1="320" y1="110" x2="320" y2="130"/><circle cx="320" cy="107" r="3" fill="#1A4A3A"/>
    <line x1="350" y1="110" x2="350" y2="130"/><circle cx="350" cy="107" r="3" fill="#1A4A3A"/>
    <line x1="380" y1="110" x2="380" y2="130"/><circle cx="380" cy="107" r="3" fill="#1A4A3A"/>
    <line x1="410" y1="110" x2="410" y2="130"/><circle cx="410" cy="107" r="3" fill="#00B386" opacity="0.6"/>
    <line x1="440" y1="110" x2="440" y2="130"/><circle cx="440" cy="107" r="3" fill="#00B386" opacity="0.6"/>
    <line x1="470" y1="110" x2="470" y2="130"/><circle cx="470" cy="107" r="3" fill="#1A4A3A"/>
    <line x1="500" y1="110" x2="500" y2="130"/><circle cx="500" cy="107" r="3" fill="#1A4A3A"/>
  </g>

  <!-- Pin rows — bottom -->
  <g stroke="#1A4A3A" stroke-width="2" opacity="0.5">
    <line x1="290" y1="370" x2="290" y2="390"/><circle cx="290" cy="393" r="3" fill="#1A4A3A"/>
    <line x1="320" y1="370" x2="320" y2="390"/><circle cx="320" cy="393" r="3" fill="#1A4A3A"/>
    <line x1="350" y1="370" x2="350" y2="390"/><circle cx="350" cy="393" r="3" fill="#00B386" opacity="0.5"/>
    <line x1="380" y1="370" x2="380" y2="390"/><circle cx="380" cy="393" r="3" fill="#1A4A3A"/>
    <line x1="410" y1="370" x2="410" y2="390"/><circle cx="410" cy="393" r="3" fill="#1A4A3A"/>
    <line x1="440" y1="370" x2="440" y2="390"/><circle cx="440" cy="393" r="3" fill="#1A4A3A"/>
    <line x1="470" y1="370" x2="470" y2="390"/><circle cx="470" cy="393" r="3" fill="#1A4A3A"/>
    <line x1="500" y1="370" x2="500" y2="390"/><circle cx="500" cy="393" r="3" fill="#1A4A3A"/>
  </g>

  <!-- Trace lines -->
  <g stroke="#00B386" stroke-width="1" opacity="0.15" fill="none">
    <path d="M100 80 L100 250 L200 250"/>
    <path d="M700 420 L700 280 L620 280"/>
    <path d="M150 400 L150 320 L220 320"/>
    <path d="M650 100 L650 170 L580 170"/>
  </g>

  <!-- Label -->
  <text x="400" y="455" font-family="monospace" font-size="11" fill="#2D6B56" text-anchor="middle" opacity="0.8">16-bit MAC Accelerator  ·  0.33 GHz  ·  Cadence Virtuoso</text>
  <text x="400" y="473" font-family="monospace" font-size="9" fill="#1A4A3A" text-anchor="middle" opacity="0.7">VLSI Custom Cell Library  ·  Radix-4 Booth  ·  6:2 Compressor</text>

  <!-- Glow effect on chip -->
  <rect x="240" y="130" width="320" height="240" rx="4" fill="none" stroke="#00B386" stroke-width="1" opacity="0.12"/>
</svg>
